name: Build and Package AppImage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux AppImage (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            python3-venv \
            python3-pip

      - name: Install appimagetool
        run: |
          sudo curl -Lo /usr/local/bin/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build and Package AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: "true"
        run: |
          bash build-appimage.sh

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kazamo-AppImage-${{ matrix.arch }}
          path: src-tauri/target/release/bundle/appimage/Kazamo_*.AppImage
          if-no-files-found: error
